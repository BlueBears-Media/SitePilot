version: '3.9'

# Infrastructure-only compose for local development.
# Runs postgres, redis, and minio — apps run locally via `bun run dev`.
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sitepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sitepilot_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sitepilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sitepilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
